<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark cosmic background circle -->
  <circle cx="32" cy="32" r="32" fill="#0d0b1a"/>

  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="28" stroke="#c9963a" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="18" stroke="#c9963a" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Astrological Sun — center circle + dot + rays -->
  <circle cx="32" cy="32" r="8" stroke="#d4a843" stroke-width="1.5" fill="none"/>
  <circle cx="32" cy="32" r="2.5" fill="#d4a843"/>

  <!-- 8 rays -->
  <line x1="32" y1="21" x2="32" y2="18"   stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="32" y2="46"   stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="32" x2="18" y2="32"   stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="46" y2="32"   stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24.2" y1="24.2" x2="22" y2="22" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39.8" y1="39.8" x2="42" y2="42" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39.8" y1="24.2" x2="42" y2="22" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24.2" y1="39.8" x2="22" y2="42" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 4 small star dots on outer ring at cardinal points -->
  <circle cx="32" cy="4"  r="1.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="32" cy="60" r="1.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="4"  cy="32" r="1.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="60" cy="32" r="1.5" fill="#d4a843" opacity="0.8"/>
</svg>
